name: E2E (testnet)

on:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E testnet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts-sdks
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ts-sdks/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ts-sdks/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm --filter @socialproof/myso-messaging-stack test:e2e
        env:
          # Required
          TEST_WALLET_PRIVATE_KEY: ${{ secrets.TEST_WALLET_PRIVATE_KEY }}
          # Optional overrides (defaults are baked into the test setup)
          MYSO_RPC_URL: ${{ vars.MYSO_RPC_URL || '' }}
          GROUPS_PACKAGE_ID: ${{ vars.GROUPS_PACKAGE_ID || '' }}
          MESSAGING_PACKAGE_ID: ${{ vars.MESSAGING_PACKAGE_ID || '' }}
          MESSAGING_NAMESPACE_ID: ${{ vars.MESSAGING_NAMESPACE_ID || '' }}
          MESSAGING_VERSION_ID: ${{ vars.MESSAGING_VERSION_ID || '' }}
          MYDATA_KEY_SERVERS: ${{ vars.MYDATA_KEY_SERVERS || '' }}
          MYDATA_THRESHOLD: ${{ vars.MYDATA_THRESHOLD || '' }}