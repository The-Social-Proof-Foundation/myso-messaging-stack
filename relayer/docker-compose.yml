services:
  relayer:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - RUST_LOG=${RUST_LOG:-messaging_relayer=info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health_check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
